<!DOCTYPE html>

<html lang="ko">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Architect Ledger HR - 로그인</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="./login.css">
</head>

<body>
    <div class="main-wrapper">
        <div class="login-container">
            <!-- Branding Header -->
            <div class="branding-header">
                <div class="logo-box">
                    <span class="material-symbols-outlined" data-icon="architecture">architecture</span>
                </div>
                <h1 class="title">Architect Ledger HR</h1>
                <p class="subtitle">임원 전용 포털 접속</p>
            </div>
            <!-- Login Card -->
            <div class="login-card">
                <form>
                    <!-- Login ID Field -->
                    <div class="form-group">
                        <div class="form-label-row">
                            <label class="label-text" for="login_id">로그인 ID</label>
                        </div>
                        <div class="input-wrapper">
                            <div class="input-icon">
                                <span class="material-symbols-outlined" data-icon="badge">badge</span>
                            </div>
                            <input class="form-input" id="login_id" name="login_id" placeholder="사번 또는 이메일"
                                type="text" />
                        </div>
                    </div>
                    <!-- Password Field -->
                    <div class="form-group">
                        <div class="form-label-row">
                            <label class="label-text" for="password">비밀번호</label>
                            <a class="forgot-link" href="{{DATA:SCREEN:PASSWORD_RECOVERY}}">분실하셨나요?</a>
                        </div>
                        <div class="input-wrapper">
                            <div class="input-icon">
                                <span class="material-symbols-outlined" data-icon="lock">lock</span>
                            </div>
                            <input class="form-input" id="password" name="password" placeholder="••••••••"
                                type="password" />
                        </div>
                    </div>
                    <!-- Remember Me -->
                    <div class="checkbox-group">
                        <input class="checkbox-input" id="remember" name="remember" type="checkbox" />
                        <label class="checkbox-label" for="remember">로그인 상태 유지</label>
                    </div>
                    <!-- Login Button -->
                    <button class="login-button" type="submit">
                        <span>로그인</span>
                        <span class="material-symbols-outlined" data-icon="arrow_forward"
                            style="font-size: 1.125rem;">arrow_forward</span>
                    </button>
                </form>
                <!-- Alternative Access -->
                <div class="social-divider">
                    <p class="social-text">또는 소셜 로그인</p>
                    <div>
                        <button class="social-button">
                            <svg class="social-icon" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                                <path
                                    d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
                                    fill="#4285F4"></path>
                                <path
                                    d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
                                    fill="#34A853"></path>
                                <path
                                    d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"
                                    fill="#FBBC05"></path>
                                <path
                                    d="M12 5.38c1.62 0 3.06.56 4.21 1.66l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
                                    fill="#EA4335"></path>
                            </svg>
                            <span>Google로 로그인</span>
                        </button>
                    </div>
                </div>
            </div>
            <!-- Help / Support -->
            <p class="support-text">
                로그인에 문제가 있나요? <a class="support-link" href="{{DATA:SCREEN:IT_SUPPORT}}">IT 지원팀에 문의하기</a>
            </p>
        </div>
    </div>
    <!-- Minimalist Footer -->
    <footer class="footer">
        <div>
            <p class="footer-text">
                © 2024 Architect Ledger HR 시스템. 정밀한 거버넌스.
            </p>
        </div>
    </footer>
    <!-- Background Decorative Elements -->
    <div class="bg-decor">
        <div class="blob-1"></div>
        <div class="blob-2"></div>
        <div class="line-decor"></div>
    </div>
</body>

</html>
